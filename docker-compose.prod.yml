# docker-compose.prod.yml

services:
  postgres:
    image: postgres:16.4-alpine
    container_name: sms-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-school_manager_db}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "${POSTGRES_PORT:-127.0.0.1:5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 8
      start_period: 10s
    restart: unless-stopped
    cpus: "0.50"
    mem_limit: "512m"
    networks:
      - backend-net

  redis:
    image: redis:7.4-alpine
    container_name: sms-redis
    # REDIS_PASSWORD must be set in the production .env file.
    # An empty password leaves Redis unauthenticated — unacceptable in production.
    command: >
      sh -c "redis-server --appendonly yes --save '60 1000'
      $${REDIS_PASSWORD:+--requirepass $${REDIS_PASSWORD}}"
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD must be set in production .env}
    ports:
      - "${REDIS_PORT:-127.0.0.1:6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test:
        - "CMD-SHELL"
        - "redis-cli -a \"$$REDIS_PASSWORD\" ping"
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 5s
    restart: unless-stopped
    cpus: "0.30"
    mem_limit: "256m"
    networks:
      - backend-net

  db-migrate:
    image: ${BACKEND_IMAGE:-ghcr.io/manlikeganga19-tech/school-management-system-backend:${IMAGE_TAG:-main}}
    env_file:
      - path: ./.env
        required: false
    environment:
      DATABASE_URL: ${DOCKER_DATABASE_URL:-postgresql+psycopg://postgres:postgres@postgres:5432/school_manager_db}
    command: ["python", "-m", "alembic", "upgrade", "head"]
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"
    cpus: "0.30"
    mem_limit: "256m"
    networks:
      - backend-net

  backend:
    image: ${BACKEND_IMAGE:-ghcr.io/manlikeganga19-tech/school-management-system-backend:${IMAGE_TAG:-main}}
    container_name: sms-backend
    env_file:
      - path: ./.env
        required: false
    environment:
      DATABASE_URL: ${DOCKER_DATABASE_URL:-postgresql+psycopg://postgres:postgres@postgres:5432/school_manager_db}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD must be set in production .env}
      GUNICORN_WORKERS: ${GUNICORN_WORKERS:-1}
      GUNICORN_LOG_LEVEL: ${GUNICORN_LOG_LEVEL:-info}
    command: ["gunicorn", "app.main:app", "--config", "/app/gunicorn.conf.py"]
    ports:
      - "${BACKEND_PORT:-127.0.0.1:8000}:8000"
    depends_on:
      db-migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl --fail http://127.0.0.1:8000/readyz || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 20s
    restart: unless-stopped
    cpus: "0.80"
    mem_limit: "512m"
    networks:
      - backend-net

  frontend:
    image: ${FRONTEND_IMAGE:-ghcr.io/manlikeganga19-tech/school-management-system-frontend:${IMAGE_TAG:-main}}
    container_name: sms-frontend
    env_file:
      - path: ./.env
        required: false
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      COOKIE_SECURE: ${COOKIE_SECURE:-true}
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-/api/v1}
      BACKEND_BASE_URL: ${BACKEND_BASE_URL:-http://nginx/api/v1}
      BACKEND_FETCH_TIMEOUT_MS: "${BACKEND_FETCH_TIMEOUT_MS:-20000}"
      AUTH_LOGIN_TIMEOUT_MS: "${AUTH_LOGIN_TIMEOUT_MS:-60000}"
    ports:
      - "${FRONTEND_PORT:-127.0.0.1:3000}:3000"
    depends_on:
      backend:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/ >/dev/null || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped
    cpus: "0.70"
    mem_limit: "512m"
    networks:
      - frontend-net

  nginx:
    image: ${NGINX_IMAGE:-ghcr.io/manlikeganga19-tech/school-management-system-nginx:${IMAGE_TAG:-main}}
    container_name: sms-nginx
    env_file:
      - path: ./.env
        required: false
    environment:
      NEXT_STATIC_CACHE_CONTROL: ${NEXT_STATIC_CACHE_CONTROL:-public,max-age=31536000,immutable}
    ports:
      - "${NGINX_HTTP_PORT:-127.0.0.1:8081}:80"
    depends_on:
      frontend:
        condition: service_started
      backend:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/nginx-healthz >/dev/null || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    cpus: "0.20"
    mem_limit: "128m"
    networks:
      - frontend-net
      - backend-net

volumes:
  postgres_data:
  redis_data:

networks:
  backend-net:
    driver: bridge
  frontend-net:
    driver: bridge
