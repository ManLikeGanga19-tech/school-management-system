# docker-compose.prod.yml

services:
  postgres:
    image: postgres:16.4-alpine
    container_name: sms-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-school_manager_db}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "${POSTGRES_PORT:-127.0.0.1:5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 8
      start_period: 10s
    restart: unless-stopped
    cpus: "0.75"
    mem_limit: "768m"
    networks:
      - backend-net

  redis:
    image: redis:7.4-alpine
    container_name: sms-redis
    command: ["redis-server", "--appendonly", "yes", "--save", "60", "1000"]
    ports:
      - "${REDIS_PORT:-127.0.0.1:6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 5s
    restart: unless-stopped
    cpus: "0.50"
    mem_limit: "512m"
    networks:
      - backend-net

  db-migrate:
    image: ${BACKEND_IMAGE:-ghcr.io/manlikeganga19-tech/school-management-system-backend:${IMAGE_TAG:-main}}
    env_file:
      - path: ./.env
        required: false
    environment:
      DATABASE_URL: ${DOCKER_DATABASE_URL:-postgresql+psycopg://postgres:postgres@postgres:5432/school_manager_db}
    command: ["python", "-m", "alembic", "upgrade", "head"]
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"
    cpus: "0.50"
    mem_limit: "512m"
    networks:
      - backend-net

  backend:
    image: ${BACKEND_IMAGE:-ghcr.io/manlikeganga19-tech/school-management-system-backend:${IMAGE_TAG:-main}}
    container_name: sms-backend
    env_file:
      - path: ./.env
        required: false
    environment:
      DATABASE_URL: ${DOCKER_DATABASE_URL:-postgresql+psycopg://postgres:postgres@postgres:5432/school_manager_db}
    command: ["python", "-m", "uvicorn", "app.main:app", "--app-dir", "/app", "--host", "0.0.0.0", "--port", "8000", "--workers", "1"]
    ports:
      - "${BACKEND_PORT:-127.0.0.1:8000}:8000"
    depends_on:
      db-migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl --fail http://127.0.0.1:8000/readyz || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 20s
    restart: unless-stopped
    cpus: "1.00"
    mem_limit: "1g"
    networks:
      - backend-net

  frontend:
    image: ${FRONTEND_IMAGE:-ghcr.io/manlikeganga19-tech/school-management-system-frontend:${IMAGE_TAG:-main}}
    container_name: sms-frontend
    env_file:
      - path: ./.env
        required: false
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      COOKIE_SECURE: ${COOKIE_SECURE:-true}
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8080/api/v1}
      BACKEND_BASE_URL: ${BACKEND_BASE_URL:-http://nginx/api/v1}
      BACKEND_FETCH_TIMEOUT_MS: "${BACKEND_FETCH_TIMEOUT_MS:-20000}"
      AUTH_LOGIN_TIMEOUT_MS: "${AUTH_LOGIN_TIMEOUT_MS:-60000}"
    ports:
      - "${FRONTEND_PORT:-127.0.0.1:3000}:3000"
    depends_on:
      backend:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/ >/dev/null || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped
    cpus: "1.00"
    mem_limit: "768m"
    networks:
      - frontend-net

  nginx:
    image: ${NGINX_IMAGE:-ghcr.io/manlikeganga19-tech/school-management-system-nginx:${IMAGE_TAG:-main}}
    container_name: sms-nginx
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
    depends_on:
      frontend:
        condition: service_started
      backend:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/nginx-healthz >/dev/null || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    cpus: "0.50"
    mem_limit: "256m"
    networks:
      - frontend-net
      - backend-net

volumes:
  postgres_data:
  redis_data:

networks:
  backend-net:
    driver: bridge
  frontend-net:
    driver: bridge
