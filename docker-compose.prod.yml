# docker-compose.prod.yml

services:
  postgres:
    # Phase 2: standardized on PostgreSQL 18 (matches the prod server the
    # backup client dumps + restores). Fresh install on the VPS — no in-place
    # major upgrade; data is restored from a v18 logical dump at cutover.
    image: postgres:18-alpine
    container_name: sms-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-school_manager_db}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "${POSTGRES_PORT:-127.0.0.1:5432}:5432"
    volumes:
      # PostgreSQL 18+ Docker images store data in major-version-specific
      # subdirectories (e.g. /var/lib/postgresql/18/docker) so that
      # `pg_upgrade --link` works without crossing a mount boundary. Mounting
      # at the pre-18 path (/var/lib/postgresql/data) makes the image treat the
      # volume as unused and refuse to start. Mount the PARENT directory.
      # See https://github.com/docker-library/postgres/pull/1259
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 8
      start_period: 10s
    restart: unless-stopped
    cpus: "0.50"
    mem_limit: "512m"
    networks:
      - backend-net

  redis:
    image: redis:7.4-alpine
    container_name: sms-redis
    # REDIS_PASSWORD must be set in the production .env file.
    # An empty password leaves Redis unauthenticated — unacceptable in production.
    command: >
      sh -c "redis-server --appendonly yes --save '60 1000'
      $${REDIS_PASSWORD:+--requirepass $${REDIS_PASSWORD}}"
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD must be set in production .env}
    ports:
      - "${REDIS_PORT:-127.0.0.1:6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test:
        - "CMD-SHELL"
        - "redis-cli -a \"$$REDIS_PASSWORD\" ping"
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 5s
    restart: unless-stopped
    cpus: "0.30"
    mem_limit: "256m"
    networks:
      - backend-net

  db-migrate:
    image: ${BACKEND_IMAGE:-ghcr.io/manlikeganga19-tech/school-management-system-backend:${IMAGE_TAG:-main}}
    env_file:
      - path: ./.env
        required: false
    environment:
      DATABASE_URL: ${DOCKER_DATABASE_URL:-postgresql+psycopg://postgres:postgres@postgres:5432/school_manager_db}
    command: ["python", "-m", "alembic", "upgrade", "heads"]
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"
    cpus: "0.30"
    mem_limit: "256m"
    networks:
      - backend-net

  backend:
    image: ${BACKEND_IMAGE:-ghcr.io/manlikeganga19-tech/school-management-system-backend:${IMAGE_TAG:-main}}
    container_name: sms-backend
    env_file:
      - path: ./.env
        required: false
    environment:
      DATABASE_URL: ${DOCKER_DATABASE_URL:-postgresql+psycopg://postgres:postgres@postgres:5432/school_manager_db}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD must be set in production .env}
      GUNICORN_WORKERS: ${GUNICORN_WORKERS:-1}
      GUNICORN_LOG_LEVEL: ${GUNICORN_LOG_LEVEL:-info}
    command: ["gunicorn", "app.main:app", "--config", "/app/gunicorn.conf.py"]
    volumes:
      - backend_storage:/app/storage
      # Phase 2: persist student-document uploads (birth certs, parent IDs,
      # transfer letters). Without this volume they lived on the ephemeral
      # container filesystem and were lost on every redeploy.
      - backend_media:/app/media
    ports:
      - "${BACKEND_PORT:-127.0.0.1:8000}:8000"
    depends_on:
      db-migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl --fail http://127.0.0.1:8000/readyz || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 20s
    restart: unless-stopped
    cpus: "0.80"
    mem_limit: "512m"
    networks:
      - backend-net

  frontend:
    image: ${FRONTEND_IMAGE:-ghcr.io/manlikeganga19-tech/school-management-system-frontend:${IMAGE_TAG:-main}}
    container_name: sms-frontend
    env_file:
      - path: ./.env
        required: false
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      COOKIE_SECURE: ${COOKIE_SECURE:-true}
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-/api/v1}
      BACKEND_BASE_URL: ${BACKEND_BASE_URL:-http://nginx/api/v1}
      BACKEND_FETCH_TIMEOUT_MS: "${BACKEND_FETCH_TIMEOUT_MS:-20000}"
      AUTH_LOGIN_TIMEOUT_MS: "${AUTH_LOGIN_TIMEOUT_MS:-60000}"
    ports:
      - "${FRONTEND_PORT:-127.0.0.1:3000}:3000"
    depends_on:
      backend:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/ >/dev/null || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped
    cpus: "0.70"
    mem_limit: "512m"
    networks:
      - frontend-net

  nginx:
    image: ${NGINX_IMAGE:-ghcr.io/manlikeganga19-tech/school-management-system-nginx:${IMAGE_TAG:-main}}
    container_name: sms-nginx
    env_file:
      - path: ./.env
        required: false
    environment:
      NEXT_STATIC_CACHE_CONTROL: ${NEXT_STATIC_CACHE_CONTROL:-public,max-age=31536000,immutable}
    ports:
      - "${NGINX_HTTP_PORT:-127.0.0.1:8081}:80"
    depends_on:
      frontend:
        condition: service_started
      backend:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/nginx-healthz >/dev/null || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    cpus: "0.20"
    mem_limit: "128m"
    networks:
      - frontend-net
      - backend-net

  caddy:
    # Phase 2: the public TLS edge. The ONLY service reachable from the
    # internet (80/443). Terminates HTTPS for every hostname and proxies to
    # the internal nginx (which routes by path). Automatic TLS for the fixed
    # hosts; on-demand TLS for tenant subdomains, gated by the backend's
    # /public/tls-authorize ask endpoint. Certs persist in caddy_data.
    # Custom image (deploy/caddy/Dockerfile) — stock Caddy has no DNS
    # plugins; this one bundles caddy-dns/cloudflare for wildcard DNS-01.
    image: ${CADDY_IMAGE:-ghcr.io/manlikeganga19-tech/school-management-system-caddy:${IMAGE_TAG:-main}}
    container_name: sms-caddy
    environment:
      ACME_EMAIL: ${ACME_EMAIL:?ACME_EMAIL must be set in production .env}
      # Cloudflare API token, scoped Zone:DNS:Edit for shulehq.co.ke —
      # used only for the ACME DNS-01 wildcard challenge.
      CF_API_TOKEN: ${CF_API_TOKEN:?CF_API_TOKEN must be set for wildcard TLS}
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"     # HTTP/3
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      nginx:
        condition: service_started
      backend:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:2019/config/ >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped
    cpus: "0.30"
    mem_limit: "128m"
    networks:
      - frontend-net
      - backend-net

  dozzle:
    # PINNED: ":latest" floated to v10, which dropped DOZZLE_USERNAME/PASSWORD
    # in favour of a users.yaml file, and the container crash-looped with
    # "No users.yaml found" -- a third-party release changing production
    # behaviour on its own. Production pins versions.
    image: amir20/dozzle:v10.6.11
    container_name: sms-dozzle
    environment:
      # Auth is intentionally off: the port is bound to 127.0.0.1 only, so
      # reaching this requires SSH to the box -- and anyone with SSH is in the
      # docker group, which is already root-equivalent. A second password here
      # guards nothing. Never expose this port publicly.
      DOZZLE_AUTH_PROVIDER: none
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    ports:
      - "${DOZZLE_PORT:-127.0.0.1:9999}:8080"
    restart: unless-stopped
    cpus: "0.10"
    mem_limit: "64m"
    networks:
      - frontend-net

volumes:
  postgres_data:
  redis_data:
  backend_storage:
  backend_media:      # Phase 2 — student documents (was unpersisted)
  caddy_data:         # Phase 2 — issued TLS certs (survive restarts)
  caddy_config:

networks:
  backend-net:
    driver: bridge
  frontend-net:
    driver: bridge
