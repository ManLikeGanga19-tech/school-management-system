<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="ShuleHQ">
  <!--
    ShuleHQ brand mark.
    Field:   deep teal #173F49 — the same brand teal used on every printed
             school document (invoices, receipts, sheets).
    Cap:     warm amber #F4B63F — the graduation mortarboard, education.
    Book:    white open book — "shule" (school), knowledge base of the HQ.
    Geometry is 16px-safe: three bold shapes, no fine detail.
  -->
  <rect x="2" y="2" width="60" height="60" rx="14" fill="#173F49"/>
  <!-- open book -->
  <path d="M13 38.5
           C 20 33.5, 28.5 33.5, 32 38.5
           L 32 52
           C 28.5 47.5, 20 47.5, 13 51.5 Z"
        fill="#FFFFFF" opacity="0.96"/>
  <path d="M51 38.5
           C 44 33.5, 35.5 33.5, 32 38.5
           L 32 52
           C 35.5 47.5, 44 47.5, 51 51.5 Z"
        fill="#FFFFFF" opacity="0.82"/>
  <!-- mortarboard -->
  <path d="M32 11 L53 21 L32 31 L11 21 Z" fill="#F4B63F"/>
  <!-- tassel -->
  <path d="M50 22.5 L50 30" stroke="#F4B63F" stroke-width="2.6" stroke-linecap="round"/>
  <circle cx="50" cy="32.2" r="2.6" fill="#F4B63F"/>
</svg>
