# .github/workflows/ci.yml
name: CI

on:
  pull_request:
    branches: [main, staging]
  push:
    branches: [main, staging]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  GHCR_ORG: manlikeganga19-tech
  BACKEND_IMAGE: ghcr.io/manlikeganga19-tech/school-management-system-backend
  FRONTEND_IMAGE: ghcr.io/manlikeganga19-tech/school-management-system-frontend
  NGINX_IMAGE: ghcr.io/manlikeganga19-tech/school-management-system-nginx

jobs:
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16.4-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: school_manager_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d school_manager_db"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 8
      redis:
        image: redis:7.4-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 8
    env:
      APP_ENV: ci
      TENANT_MODE: domain
      DATABASE_URL: postgresql+psycopg://postgres:postgres@127.0.0.1:5432/school_manager_db
      JWT_SECRET: ci-jwt-secret-please-change-in-real-environments
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Run backend tests
        run: pytest -q tests/test_admin_saas_endpoints.py

  frontend-checks:
    name: Frontend Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Build frontend
        run: npm run build

  docker-images:
    name: Build And Push Images
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-checks]
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve image tags
        id: tags
        shell: bash
        run: |
          set -euo pipefail
          SHORT_SHA="${GITHUB_SHA::7}"
          BRANCH_TAG="$(echo "${GITHUB_REF_NAME}" | tr '[:upper:]' '[:lower:]' | tr '/' '-')"

          extra_tag=""
          if [ "${BRANCH_TAG}" = "main" ]; then
            extra_tag=",latest"
          elif [ "${BRANCH_TAG}" = "staging" ]; then
            extra_tag=",staging-latest"
          fi

          backend_tags="${BACKEND_IMAGE}:${SHORT_SHA},${BACKEND_IMAGE}:sha-${SHORT_SHA},${BACKEND_IMAGE}:${BRANCH_TAG}"
          frontend_tags="${FRONTEND_IMAGE}:${SHORT_SHA},${FRONTEND_IMAGE}:sha-${SHORT_SHA},${FRONTEND_IMAGE}:${BRANCH_TAG}"
          nginx_tags="${NGINX_IMAGE}:${SHORT_SHA},${NGINX_IMAGE}:sha-${SHORT_SHA},${NGINX_IMAGE}:${BRANCH_TAG}"

          if [ -n "${extra_tag}" ]; then
            backend_tags="${backend_tags},${BACKEND_IMAGE}:${extra_tag#,}"
            frontend_tags="${frontend_tags},${FRONTEND_IMAGE}:${extra_tag#,}"
            nginx_tags="${nginx_tags},${NGINX_IMAGE}:${extra_tag#,}"
          fi

          echo "short_sha=${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "backend_tags=${backend_tags}" >> "$GITHUB_OUTPUT"
          echo "frontend_tags=${frontend_tags}" >> "$GITHUB_OUTPUT"
          echo "nginx_tags=${nginx_tags}" >> "$GITHUB_OUTPUT"

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          target: runtime
          push: true
          tags: ${{ steps.tags.outputs.backend_tags }}
          cache-from: type=gha,scope=backend-image
          cache-to: type=gha,scope=backend-image,mode=max

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          target: runner
          push: true
          tags: ${{ steps.tags.outputs.frontend_tags }}
          cache-from: type=gha,scope=frontend-image
          cache-to: type=gha,scope=frontend-image,mode=max

      - name: Build and push nginx image
        uses: docker/build-push-action@v6
        with:
          context: ./infra/nginx
          file: ./infra/nginx/Dockerfile
          push: true
          tags: ${{ steps.tags.outputs.nginx_tags }}
          cache-from: type=gha,scope=nginx-image
          cache-to: type=gha,scope=nginx-image,mode=max
