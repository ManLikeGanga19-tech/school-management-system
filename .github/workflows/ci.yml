# .github/workflows/ci.yml
name: CI

on:
  pull_request:
    branches: [main, staging]
  push:
    branches: [main, staging]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  GHCR_ORG: manlikeganga19-tech
  BACKEND_IMAGE: ghcr.io/manlikeganga19-tech/school-management-system-backend
  FRONTEND_IMAGE: ghcr.io/manlikeganga19-tech/school-management-system-frontend
  NGINX_IMAGE: ghcr.io/manlikeganga19-tech/school-management-system-nginx

jobs:
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16.4-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: school_manager_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d school_manager_db"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 8
      redis:
        image: redis:7.4-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 8
    env:
      APP_ENV: ci
      TENANT_MODE: domain
      DATABASE_URL: postgresql+psycopg://postgres:postgres@127.0.0.1:5432/school_manager_db
      REDIS_URL: redis://localhost:6379/0
      JWT_SECRET: ci-jwt-secret-please-change-in-real-environments
      # Daraja: a non-empty token activates token validation so callback tests
      # can assert that missing/wrong tokens are rejected with 401.
      DARAJA_CALLBACK_TOKEN: ci-daraja-callback-token
      # Public OAuth: must match the secret used in test_public.py (OAUTH_SECRET).
      # _expected_public_oauth_secret() falls back to this for APP_ENV not in
      # {dev, local, development, test}, so we set it explicitly for APP_ENV=ci.
      PUBLIC_OAUTH_SHARED_SECRET: dev-public-oauth-bridge-secret
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run backend tests
        # Run the full test suite. CI uses APP_ENV=ci so it hits the real
        # postgres/redis services spun up above (no mocks for integration paths).
        run: pytest -q tests/

  frontend-checks:
    name: Frontend Checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Unit tests
        # Run jest without coverage — coverage reporting adds significant time
        # and is better suited for a scheduled job or a dedicated coverage report step.
        run: npx jest --no-coverage --ci

      - name: Build frontend
        run: npm run build

  docker-images:
    name: Build And Push Images
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-checks]
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    outputs:
      short_sha: ${{ steps.tags.outputs.short_sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve image tags
        id: tags
        shell: bash
        run: |
          set -euo pipefail
          SHORT_SHA="${GITHUB_SHA::7}"
          BRANCH_TAG="$(echo "${GITHUB_REF_NAME}" | tr '[:upper:]' '[:lower:]' | tr '/' '-')"

          extra_tag=""
          if [ "${BRANCH_TAG}" = "main" ]; then
            extra_tag=",latest"
          elif [ "${BRANCH_TAG}" = "staging" ]; then
            extra_tag=",staging-latest"
          fi

          backend_tags="${BACKEND_IMAGE}:${SHORT_SHA},${BACKEND_IMAGE}:sha-${SHORT_SHA},${BACKEND_IMAGE}:${BRANCH_TAG}"
          frontend_tags="${FRONTEND_IMAGE}:${SHORT_SHA},${FRONTEND_IMAGE}:sha-${SHORT_SHA},${FRONTEND_IMAGE}:${BRANCH_TAG}"
          nginx_tags="${NGINX_IMAGE}:${SHORT_SHA},${NGINX_IMAGE}:sha-${SHORT_SHA},${NGINX_IMAGE}:${BRANCH_TAG}"

          if [ -n "${extra_tag}" ]; then
            backend_tags="${backend_tags},${BACKEND_IMAGE}:${extra_tag#,}"
            frontend_tags="${frontend_tags},${FRONTEND_IMAGE}:${extra_tag#,}"
            nginx_tags="${nginx_tags},${NGINX_IMAGE}:${extra_tag#,}"
          fi

          echo "short_sha=${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "backend_tags=${backend_tags}" >> "$GITHUB_OUTPUT"
          echo "frontend_tags=${frontend_tags}" >> "$GITHUB_OUTPUT"
          echo "nginx_tags=${nginx_tags}" >> "$GITHUB_OUTPUT"

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          target: runtime
          push: true
          tags: ${{ steps.tags.outputs.backend_tags }}
          cache-from: type=gha,scope=backend-image
          cache-to: type=gha,scope=backend-image,mode=max

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          target: runner
          push: true
          tags: ${{ steps.tags.outputs.frontend_tags }}
          cache-from: type=gha,scope=frontend-image
          cache-to: type=gha,scope=frontend-image,mode=max

      - name: Build and push nginx image
        uses: docker/build-push-action@v6
        with:
          context: ./infra/nginx
          file: ./infra/nginx/Dockerfile
          push: true
          tags: ${{ steps.tags.outputs.nginx_tags }}
          cache-from: type=gha,scope=nginx-image
          cache-to: type=gha,scope=nginx-image,mode=max

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: docker-images
    if: github.event_name == 'push' && github.ref == 'refs/heads/staging'
    environment:
      name: staging
      url: https://staging.shulehq.co.ke
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Copy compose file to staging droplet
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.STAGING_SSH_HOST }}
          username: ${{ secrets.STAGING_SSH_USER }}
          key: ${{ secrets.STAGING_SSH_PRIVATE_KEY }}
          source: docker-compose.prod.yml
          target: ${{ secrets.STAGING_DEPLOY_PATH }}

      - name: Deploy on staging droplet
        uses: appleboy/ssh-action@v1
        env:
          IMAGE_TAG: ${{ needs.docker-images.outputs.short_sha }}
          GHCR_USER: ${{ secrets.GHCR_USERNAME }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          ENV_FILE: ${{ secrets.STAGING_ENV_FILE }}
          DEPLOY_PATH: ${{ secrets.STAGING_DEPLOY_PATH }}
        with:
          host: ${{ secrets.STAGING_SSH_HOST }}
          username: ${{ secrets.STAGING_SSH_USER }}
          key: ${{ secrets.STAGING_SSH_PRIVATE_KEY }}
          envs: IMAGE_TAG,GHCR_USER,GHCR_TOKEN,ENV_FILE,DEPLOY_PATH
          script: |
            set -euo pipefail
            DEPLOY_DIR="$DEPLOY_PATH"

            # Write .env atomically (never leave a partial file)
            printf '%s\n' "$ENV_FILE"        > "$DEPLOY_DIR/.env.tmp"
            echo "IMAGE_TAG=$IMAGE_TAG"     >> "$DEPLOY_DIR/.env.tmp"
            mv "$DEPLOY_DIR/.env.tmp" "$DEPLOY_DIR/.env"

            # Pull new images from GHCR
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin
            IMAGE_TAG="$IMAGE_TAG" docker compose \
              -f "$DEPLOY_DIR/docker-compose.prod.yml" \
              --env-file "$DEPLOY_DIR/.env" \
              pull

            # Rolling restart
            IMAGE_TAG="$IMAGE_TAG" docker compose \
              -f "$DEPLOY_DIR/docker-compose.prod.yml" \
              --env-file "$DEPLOY_DIR/.env" \
              up -d --remove-orphans

            # Smoke test — nginx on loopback (Caddy proxies 443 → 8081)
            echo "Waiting for services to stabilise..."
            sleep 20
            curl --fail --silent --show-error http://127.0.0.1:8081/nginx-healthz
            echo ""
            echo "Staging deploy complete: $IMAGE_TAG"

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: docker-images
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment:
      name: production
      url: https://shulehq.co.ke
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Copy compose file to production droplet
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.PRODUCTION_SSH_HOST }}
          username: ${{ secrets.PRODUCTION_SSH_USER }}
          key: ${{ secrets.PRODUCTION_SSH_PRIVATE_KEY }}
          source: docker-compose.prod.yml
          target: ${{ secrets.PRODUCTION_DEPLOY_PATH }}

      - name: Deploy on production droplet
        uses: appleboy/ssh-action@v1
        env:
          IMAGE_TAG: ${{ needs.docker-images.outputs.short_sha }}
          GHCR_USER: ${{ secrets.GHCR_USERNAME }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          ENV_FILE: ${{ secrets.PRODUCTION_ENV_FILE }}
          DEPLOY_PATH: ${{ secrets.PRODUCTION_DEPLOY_PATH }}
        with:
          host: ${{ secrets.PRODUCTION_SSH_HOST }}
          username: ${{ secrets.PRODUCTION_SSH_USER }}
          key: ${{ secrets.PRODUCTION_SSH_PRIVATE_KEY }}
          envs: IMAGE_TAG,GHCR_USER,GHCR_TOKEN,ENV_FILE,DEPLOY_PATH
          script: |
            set -euo pipefail
            DEPLOY_DIR="$DEPLOY_PATH"

            # Write .env atomically
            printf '%s\n' "$ENV_FILE"        > "$DEPLOY_DIR/.env.tmp"
            echo "IMAGE_TAG=$IMAGE_TAG"     >> "$DEPLOY_DIR/.env.tmp"
            mv "$DEPLOY_DIR/.env.tmp" "$DEPLOY_DIR/.env"

            # Pull new images from GHCR
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin
            IMAGE_TAG="$IMAGE_TAG" docker compose \
              -f "$DEPLOY_DIR/docker-compose.prod.yml" \
              --env-file "$DEPLOY_DIR/.env" \
              pull

            # Rolling restart
            IMAGE_TAG="$IMAGE_TAG" docker compose \
              -f "$DEPLOY_DIR/docker-compose.prod.yml" \
              --env-file "$DEPLOY_DIR/.env" \
              up -d --remove-orphans

            # Smoke test
            echo "Waiting for services to stabilise..."
            sleep 20
            curl --fail --silent --show-error http://127.0.0.1:8081/nginx-healthz
            echo ""
            echo "Production deploy complete: $IMAGE_TAG"
