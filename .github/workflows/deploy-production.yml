# .github/workflows/deploy-production.yml
name: Deploy Production (main only)

run-name: Deploy Production (${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_branch || github.ref_name }})

on:
  workflow_run:
    workflows: ["CI"]
    branches: [main]
    types: [completed]
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Optional image tag for rollback (example: a1b2c3d)"
        required: false
        type: string

concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  GHCR_ORG: manlikeganga19-tech
  BACKEND_IMAGE: ghcr.io/manlikeganga19-tech/school-management-system-backend
  FRONTEND_IMAGE: ghcr.io/manlikeganga19-tech/school-management-system-frontend
  NGINX_IMAGE: ghcr.io/manlikeganga19-tech/school-management-system-nginx
  PROD_DOMAIN: shulehq.co.ke

jobs:
  deploy:
    name: Deploy to Production Host
    runs-on: ubuntu-latest
    environment: production
    if: >
      (github.event_name == 'workflow_dispatch' && github.ref_name == 'main') ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main')
    permissions:
      contents: read
      packages: read
    env:
      PRODUCTION_SSH_HOST: ${{ secrets.PRODUCTION_SSH_HOST }}
      PRODUCTION_SSH_USER: ${{ secrets.PRODUCTION_SSH_USER }}
      PRODUCTION_SSH_PRIVATE_KEY: ${{ secrets.PRODUCTION_SSH_PRIVATE_KEY }}
      PRODUCTION_DEPLOY_PATH: ${{ secrets.PRODUCTION_DEPLOY_PATH }}
      PRODUCTION_ENV_FILE: ${{ secrets.PRODUCTION_ENV_FILE }}
      GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
      GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
    steps:
      - name: Validate production secrets
        shell: bash
        run: |
          set -euo pipefail
          required=(PRODUCTION_SSH_HOST PRODUCTION_SSH_USER PRODUCTION_SSH_PRIVATE_KEY PRODUCTION_ENV_FILE)
          for key in "${required[@]}"; do
            if [ -z "${!key:-}" ]; then
              echo "Missing required secret: ${key}"
              exit 1
            fi
          done

      - name: Resolve deploy tag
        id: tag
        shell: bash
        run: |
          set -euo pipefail
          DEPLOY_TAG=""
          FALLBACK_TAG="latest"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ inputs.image_tag }}" ]; then
            DEPLOY_TAG="${{ inputs.image_tag }}"
          elif [ "${{ github.event_name }}" = "workflow_run" ]; then
            DEPLOY_TAG="${{ github.event.workflow_run.head_sha }}"
            DEPLOY_TAG="${DEPLOY_TAG::7}"
          else
            DEPLOY_TAG="main"
          fi
          echo "value=${DEPLOY_TAG}" >> "$GITHUB_OUTPUT"
          echo "fallback=${FALLBACK_TAG}" >> "$GITHUB_OUTPUT"

      - name: Fetch deploy manifest
        shell: bash
        run: |
          set -euo pipefail
          DEPLOY_REF="${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}"
          curl -fsSL \
            -H "Authorization: Bearer ${{ github.token }}" \
            -H "Accept: application/vnd.github.raw" \
            "https://api.github.com/repos/${{ github.repository }}/contents/docker-compose.prod.yml?ref=${DEPLOY_REF}" \
            -o docker-compose.prod.yml
          test -s docker-compose.prod.yml

      - name: Fetch release images on runner
        shell: bash
        run: |
          set -euo pipefail
          echo '${{ github.token }}' | docker login ghcr.io -u '${{ github.actor }}' --password-stdin
          REQUESTED_TAG="${{ steps.tag.outputs.value }}"
          FALLBACK_TAG="${{ steps.tag.outputs.fallback }}"
          CANDIDATE_TAGS=("${REQUESTED_TAG}")
          if [ -n "${FALLBACK_TAG}" ] && [ "${FALLBACK_TAG}" != "${REQUESTED_TAG}" ]; then
            CANDIDATE_TAGS+=("${FALLBACK_TAG}")
          fi

          RESOLVED_TAG=""
          for candidate in "${CANDIDATE_TAGS[@]}"; do
            echo "Checking release images for tag: ${candidate}"
            if docker manifest inspect "${BACKEND_IMAGE}:${candidate}" >/dev/null 2>&1 \
              && docker manifest inspect "${FRONTEND_IMAGE}:${candidate}" >/dev/null 2>&1 \
              && docker manifest inspect "${NGINX_IMAGE}:${candidate}" >/dev/null 2>&1; then
              RESOLVED_TAG="${candidate}"
              break
            fi
          done

          if [ -z "${RESOLVED_TAG}" ]; then
            echo "No published release images found for tags: ${CANDIDATE_TAGS[*]}"
            exit 1
          fi

          echo "Using release image tag: ${RESOLVED_TAG}"
          printf 'RESOLVED_IMAGE_TAG=%s\n' "${RESOLVED_TAG}" >> "$GITHUB_ENV"

          IMAGES=(
            "${BACKEND_IMAGE}:${RESOLVED_TAG}"
            "${FRONTEND_IMAGE}:${RESOLVED_TAG}"
            "${NGINX_IMAGE}:${RESOLVED_TAG}"
          )
          docker pull "${IMAGES[0]}"
          docker pull "${IMAGES[1]}"
          docker pull "${IMAGES[2]}"
          docker save "${IMAGES[@]}" | gzip -1 > .release-images.tgz
          ls -lh .release-images.tgz

      - name: Build runtime env file
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${PRODUCTION_DEPLOY_PATH}" ]; then
            PRODUCTION_DEPLOY_PATH="/opt/school-erp-production"
            echo "PRODUCTION_DEPLOY_PATH not provided. Falling back to ${PRODUCTION_DEPLOY_PATH}"
          fi
          printf "%s\n" "${PRODUCTION_ENV_FILE}" | sed '/^\(APP_ENV\|PROD_DOMAIN\|IMAGE_TAG\|BACKEND_IMAGE\|FRONTEND_IMAGE\|NGINX_IMAGE\|NGINX_HTTP_PORT\|NEXT_PUBLIC_API_BASE_URL\|BACKEND_BASE_URL\|COOKIE_SECURE\)=/d' > .deploy.env
          {
            echo ""
            echo "APP_ENV=prod"
            echo "PROD_DOMAIN=${PROD_DOMAIN}"
            echo "IMAGE_TAG=${RESOLVED_IMAGE_TAG}"
            echo "BACKEND_IMAGE=${BACKEND_IMAGE}:${RESOLVED_IMAGE_TAG}"
            echo "FRONTEND_IMAGE=${FRONTEND_IMAGE}:${RESOLVED_IMAGE_TAG}"
            echo "NGINX_IMAGE=${NGINX_IMAGE}:${RESOLVED_IMAGE_TAG}"
            echo "NGINX_HTTP_PORT=127.0.0.1:8081"
            echo "NEXT_PUBLIC_API_BASE_URL=/api/v1"
            echo "BACKEND_BASE_URL=http://nginx/api/v1"
            echo "COOKIE_SECURE=true"
          } >> .deploy.env

      - name: Prepare production SSH key
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          export SSH_PRIVATE_KEY_INPUT="${PRODUCTION_SSH_PRIVATE_KEY}"
          python3 - <<'PY'
          import base64
          import os
          import pathlib
          import subprocess
          import sys

          raw = os.environ.get("SSH_PRIVATE_KEY_INPUT", "")
          key_path = pathlib.Path.home() / ".ssh" / "deploy_key"
          candidates = []

          def add(value: str) -> None:
              if not value:
                  return
              value = value.strip()
              if not value:
                  return
              if len(value) >= 2 and value[0] == value[-1] and value[0] in {"'", '"'}:
                  value = value[1:-1]
              value = value.replace("\r", "")
              if value and value not in candidates:
                  candidates.append(value)

          add(raw)
          add(raw.replace("\\n", "\n"))

          compact_sources = { "".join(raw.split()) }
          trimmed = raw.strip()
          if len(trimmed) >= 2 and trimmed[0] == trimmed[-1] and trimmed[0] in {"'", '"'}:
              compact_sources.add("".join(trimmed[1:-1].split()))

          for source in compact_sources:
              if not source:
                  continue
              try:
                  decoded = base64.b64decode(source + ("=" * (-len(source) % 4)), validate=False).decode("utf-8")
              except Exception:
                  continue
              add(decoded)
              add(decoded.replace("\\n", "\n"))

          for candidate in candidates:
              content = candidate if candidate.endswith("\n") else candidate + "\n"
              key_path.write_text(content)
              key_path.chmod(0o600)
              result = subprocess.run(
                  ["ssh-keygen", "-y", "-f", str(key_path)],
                  stdout=subprocess.DEVNULL,
                  stderr=subprocess.DEVNULL,
              )
              if result.returncode == 0:
                  print("Production SSH key parsed successfully")
                  sys.exit(0)

          normalized = raw.strip()
          hint = "Store the full private key in OpenSSH format or as a base64-encoded OpenSSH private key."
          if normalized.startswith(("ssh-ed25519 ", "ssh-rsa ", "ecdsa-sha2-")):
              hint += " The current value looks like a public key."
          elif normalized.startswith("PuTTY-User-Key-File-"):
              hint += " The current value looks like a PuTTY .ppk file."
          print(f"Invalid PRODUCTION_SSH_PRIVATE_KEY. {hint}")
          sys.exit(1)
          PY

      - name: Trust production host key
        shell: bash
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H "${PRODUCTION_SSH_HOST}" >> ~/.ssh/known_hosts

      - name: Hydrate runtime env from current production host
        shell: bash
        run: |
          set -euo pipefail
          DEPLOY_PATH="${PRODUCTION_DEPLOY_PATH:-/opt/school-erp-production}"
          ssh -i ~/.ssh/deploy_key -o IdentitiesOnly=yes "${PRODUCTION_SSH_USER}@${PRODUCTION_SSH_HOST}" "
            set -euo pipefail
            if [ -f '${DEPLOY_PATH}/.env' ]; then
              cat '${DEPLOY_PATH}/.env'
            fi
          " > .remote.env || true

          if [ ! -s .remote.env ]; then
            echo "No current production .env found on host; continuing with provided environment secret only."
            exit 0
          fi

          runtime_keys=(
            APP_NAME
            TENANT_MODE
            NODE_ENV
            COOKIE_SAMESITE
            COOKIE_DOMAIN
            NEXT_PUBLIC_PUBLIC_HOST
            NEXT_PUBLIC_ADMIN_HOST
            NEXT_PUBLIC_TENANT_BASE_HOST
            NEXT_STATIC_CACHE_CONTROL
            BACKEND_FETCH_TIMEOUT_MS
            AUTH_LOGIN_TIMEOUT_MS
            GOOGLE_OAUTH_CLIENT_ID
            GOOGLE_OAUTH_CLIENT_SECRET
            GOOGLE_OAUTH_REDIRECT_URI
            PUBLIC_OAUTH_SHARED_SECRET
            POSTGRES_DB
            POSTGRES_USER
            POSTGRES_PASSWORD
            DATABASE_URL
            DOCKER_DATABASE_URL
            REDIS_URL
            JWT_SECRET
            JWT_ACCESS_TTL_MIN
            JWT_REFRESH_TTL_DAYS
            CORS_ORIGINS
            DB_POOL_SIZE
            DB_MAX_OVERFLOW
            DB_POOL_TIMEOUT_SEC
            DB_POOL_RECYCLE_SEC
            DB_POOL_PRE_PING
            AUDIT_QUEUE_MAXSIZE
            AUDIT_WORKERS
            AUDIT_POOL_RESERVE
            DARAJA_ENV
            DARAJA_CONSUMER_KEY
            DARAJA_CONSUMER_SECRET
            DARAJA_SHORTCODE
            DARAJA_PASSKEY
            DARAJA_CALLBACK_BASE_URL
            DARAJA_CALLBACK_TOKEN
            DARAJA_TIMEOUT_SEC
            DARAJA_USE_MOCK
            DARAJA_SANDBOX_FALLBACK_TO_MOCK
          )

          value_from_file() {
            local file="$1"
            local key="$2"
            local line
            line="$(grep -E "^${key}=" "${file}" | tail -n 1 || true)"
            printf '%s' "${line#*=}"
          }

          for key in "${runtime_keys[@]}"; do
            current_value="$(value_from_file .deploy.env "${key}")"
            if [ -n "${current_value}" ] && [[ ! "${current_value}" =~ ^replace-with- ]]; then
              continue
            fi

            remote_value="$(value_from_file .remote.env "${key}")"
            if [ -z "${remote_value}" ]; then
              continue
            fi

            sed -i "/^${key}=/d" .deploy.env
            printf '%s=%s\n' "${key}" "${remote_value}" >> .deploy.env
          done

      - name: Validate runtime env file
        shell: bash
        run: |
          set -euo pipefail

          required_keys=(
            APP_NAME
            TENANT_MODE
            NODE_ENV
            COOKIE_SECURE
            COOKIE_SAMESITE
            NEXT_PUBLIC_API_BASE_URL
            NEXT_PUBLIC_PUBLIC_HOST
            NEXT_PUBLIC_ADMIN_HOST
            NEXT_PUBLIC_TENANT_BASE_HOST
            BACKEND_BASE_URL
            POSTGRES_DB
            POSTGRES_USER
            POSTGRES_PASSWORD
            DATABASE_URL
            DOCKER_DATABASE_URL
            REDIS_URL
            JWT_SECRET
            JWT_ACCESS_TTL_MIN
            JWT_REFRESH_TTL_DAYS
            CORS_ORIGINS
          )

          missing=()
          placeholders=()

          value_for() {
            local key="$1"
            local line
            line="$(grep -E "^${key}=" .deploy.env | tail -n 1 || true)"
            printf '%s' "${line#*=}"
          }

          for key in "${required_keys[@]}"; do
            value="$(value_for "${key}")"
            if [ -z "${value}" ]; then
              missing+=("${key}")
              continue
            fi
            if [[ "${value}" =~ ^replace-with- ]]; then
              placeholders+=("${key}")
            fi
          done

          google_client_id="$(value_for GOOGLE_OAUTH_CLIENT_ID)"
          google_client_secret="$(value_for GOOGLE_OAUTH_CLIENT_SECRET)"
          oauth_shared_secret="$(value_for PUBLIC_OAUTH_SHARED_SECRET)"
          if { [ -n "${google_client_id}" ] || [ -n "${google_client_secret}" ]; } && [ -z "${oauth_shared_secret}" ]; then
            missing+=("PUBLIC_OAUTH_SHARED_SECRET")
          fi
          if [ -n "${oauth_shared_secret}" ] && [[ "${oauth_shared_secret}" =~ ^replace-with- ]]; then
            placeholders+=("PUBLIC_OAUTH_SHARED_SECRET")
          fi

          if [ "${#missing[@]}" -gt 0 ]; then
            printf 'Runtime env file is missing required keys: %s\n' "${missing[*]}"
            exit 1
          fi

          if [ "${#placeholders[@]}" -gt 0 ]; then
            printf 'Runtime env file still contains placeholder values for: %s\n' "${placeholders[*]}"
            exit 1
          fi

          printf 'Validated runtime env file with %s required keys.\n' "${#required_keys[@]}"

      - name: Upload deploy bundle
        shell: bash
        run: |
          set -euo pipefail
          DEPLOY_PATH="${PRODUCTION_DEPLOY_PATH:-/opt/school-erp-production}"
          ssh -i ~/.ssh/deploy_key -o IdentitiesOnly=yes "${PRODUCTION_SSH_USER}@${PRODUCTION_SSH_HOST}" "mkdir -p '${DEPLOY_PATH}'"
          scp -i ~/.ssh/deploy_key -o IdentitiesOnly=yes docker-compose.prod.yml .deploy.env .release-images.tgz "${PRODUCTION_SSH_USER}@${PRODUCTION_SSH_HOST}:${DEPLOY_PATH}/"

      - name: Verify remote deploy bundle
        shell: bash
        run: |
          set -euo pipefail
          DEPLOY_PATH="${PRODUCTION_DEPLOY_PATH:-/opt/school-erp-production}"
          ssh -i ~/.ssh/deploy_key -o IdentitiesOnly=yes "${PRODUCTION_SSH_USER}@${PRODUCTION_SSH_HOST}" "
            set -euo pipefail
            ls -la '${DEPLOY_PATH}'
            test -f '${DEPLOY_PATH}/docker-compose.prod.yml'
            test -f '${DEPLOY_PATH}/.deploy.env'
            test -f '${DEPLOY_PATH}/.release-images.tgz'
          "

      - name: Deploy on production host
        shell: bash
        run: |
          set -euo pipefail
          DEPLOY_PATH="${PRODUCTION_DEPLOY_PATH:-/opt/school-erp-production}"
          ssh -i ~/.ssh/deploy_key -o IdentitiesOnly=yes "${PRODUCTION_SSH_USER}@${PRODUCTION_SSH_HOST}" "
            set -euo pipefail
            cd '${DEPLOY_PATH}'
            mv -f .deploy.env .env
            gunzip -c .release-images.tgz | docker load
            rm -f .release-images.tgz
            grep -E '^(NGINX_HTTP_PORT|NEXT_PUBLIC_API_BASE_URL|BACKEND_BASE_URL|COOKIE_SECURE)=' .env
            docker compose --env-file .env -f docker-compose.prod.yml up -d --wait postgres redis
            POSTGRES_USER_VALUE=\${POSTGRES_USER:-postgres}
            POSTGRES_PASSWORD_VALUE=\${POSTGRES_PASSWORD:-postgres}
            POSTGRES_USER_SQL=\$(printf '%s' \"\${POSTGRES_USER_VALUE}\" | sed 's/\"/\"\"/g')
            POSTGRES_PASSWORD_SQL=\$(printf '%s' \"\${POSTGRES_PASSWORD_VALUE}\" | sed \"s/'/''/g\")
            docker exec -u postgres sms-postgres psql -v ON_ERROR_STOP=1 --dbname postgres \
              -c \"ALTER ROLE \\\"\${POSTGRES_USER_SQL}\\\" WITH PASSWORD '\${POSTGRES_PASSWORD_SQL}';\"
            docker compose --env-file .env -f docker-compose.prod.yml run --rm --no-deps db-migrate
            docker compose --env-file .env -f docker-compose.prod.yml up -d --remove-orphans
            docker compose --env-file .env -f docker-compose.prod.yml ps
            docker compose --env-file .env -f docker-compose.prod.yml logs --tail=120 backend frontend nginx || true
            NGINX_BIND=\$(grep -E '^NGINX_HTTP_PORT=' .env | tail -n 1 | cut -d'=' -f2 | tr -d '[:space:]' || true)
            if [ -z \"\${NGINX_BIND}\" ]; then NGINX_BIND=80; fi
            NGINX_HEALTH_PORT=\"\${NGINX_BIND##*:}\"
            curl -fsS \"http://127.0.0.1:\${NGINX_HEALTH_PORT}/nginx-healthz\" >/dev/null
          "

      - name: Clean runner image bundle
        if: always()
        shell: bash
        run: rm -f .release-images.tgz
