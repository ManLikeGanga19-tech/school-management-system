# docker-compose.yml

services:
  postgres:
    image: postgres:16.4-alpine
    container_name: sms-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-school_manager_db}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      # pg_isready alone returns OK during crash recovery before user queries work.
      # The psql SELECT 1 gate ensures the DB is fully up and accepting connections.
      test:
        - "CMD-SHELL"
        - "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB && psql -U $$POSTGRES_USER -d $$POSTGRES_DB -q -c 'SELECT 1' > /dev/null 2>&1"
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    networks:
      - backend-net

  redis:
    image: redis:7.4-alpine
    container_name: sms-redis
    # When REDIS_PASSWORD is set, start Redis with --requirepass so that all
    # clients (backend, rate-limiter) must authenticate. Leave REDIS_PASSWORD
    # empty in .env for password-free local dev.
    command: >
      sh -c "redis-server --appendonly yes --save '60 1000'
      $${REDIS_PASSWORD:+--requirepass $${REDIS_PASSWORD}}"
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test:
        - "CMD-SHELL"
        - >-
          if [ -n "$$REDIS_PASSWORD" ]; then
            redis-cli -a "$$REDIS_PASSWORD" ping;
          else
            redis-cli ping;
          fi
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 5s
    networks:
      - backend-net

  db-migrate:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: runtime
    image: school-erp-backend:dev
    env_file:
      - path: ./.env
        required: false
      - path: ./backend/.env
        required: false
    environment:
      DATABASE_URL: ${DOCKER_DATABASE_URL:-postgresql+psycopg://postgres:postgres@postgres:5432/school_manager_db}
    command: >
      python -m alembic upgrade head
    volumes:
      - ./backend/alambic:/app/alambic  # always use local migration files so new migrations are visible without a rebuild
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"
    networks:
      - backend-net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: runtime
    image: school-erp-backend:dev
    container_name: sms-backend
    env_file:
      - path: ./.env
        required: false
      - path: ./backend/.env
        required: false
    environment:
      DATABASE_URL: ${DOCKER_DATABASE_URL:-postgresql+psycopg://postgres:postgres@postgres:5432/school_manager_db}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
    command: >
      uvicorn app.main:app --app-dir /app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - ./backend:/app
    depends_on:
      db-migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl --fail http://127.0.0.1:8000/readyz || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 20s
    networks:
      - backend-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: deps
    image: school-erp-frontend:dev
    container_name: sms-frontend
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8080/api/v1}
      BACKEND_BASE_URL: ${BACKEND_BASE_URL:-http://nginx/api/v1}
      BACKEND_FETCH_TIMEOUT_MS: "${BACKEND_FETCH_TIMEOUT_MS:-20000}"
      AUTH_LOGIN_TIMEOUT_MS: "${AUTH_LOGIN_TIMEOUT_MS:-60000}"
      CHOKIDAR_USEPOLLING: "${CHOKIDAR_USEPOLLING:-true}"
      WATCHPACK_POLLING: "${WATCHPACK_POLLING:-true}"
      # Local dev: makes novel-school.localhost:8080/login resolve as a tenant portal
      NEXT_PUBLIC_TENANT_BASE_HOST: ${NEXT_PUBLIC_TENANT_BASE_HOST:-localhost}
    command: >
      sh -c "[ -d node_modules/.bin ] || npm ci; npm run dev -- --hostname 0.0.0.0 --port 3000"
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      backend:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/ >/dev/null || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - frontend-net

  nginx:
    build:
      context: ./infra/nginx
      dockerfile: Dockerfile
    image: school-erp-nginx:dev
    container_name: sms-nginx
    environment:
      NEXT_STATIC_CACHE_CONTROL: ${NEXT_STATIC_CACHE_CONTROL:-no-store,max-age=0,must-revalidate}
    ports:
      - "${NGINX_HTTP_PORT:-8080}:80"
    depends_on:
      frontend:
        condition: service_started
      backend:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/nginx-healthz >/dev/null || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - frontend-net
      - backend-net

volumes:
  postgres_data:
  redis_data:
  frontend_node_modules:

networks:
  backend-net:
    driver: bridge
  frontend-net:
    driver: bridge
