services:
  # ── Backend (FastAPI / Gunicorn) ────────────────────────────────────────────
  - type: web
    name: shulehq-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    preDeployCommand: python -m alembic upgrade heads
    # Single uvicorn process — no gunicorn master overhead (~50 MB saved).
    # Starter plan has 512 MB RAM; one async worker is enough for a single tenant.
    # Switch back to gunicorn with GUNICORN_WORKERS=2 when upgrading to Standard.
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port 8000 --timeout-keep-alive 75 --log-level info
    plan: starter        # $7/mo — upgrade to standard ($25/mo) when load grows
    healthCheckPath: /readyz
    autoDeploy: true
    envVars:
      # ── Filled automatically by Render from linked databases ────────────────
      - key: DATABASE_URL
        fromDatabase:
          name: shulehq-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: shulehq-redis
          type: redis
          property: connectionString

      # ── Set these manually in the Render dashboard after first deploy ───────
      - key: SECRET_KEY
        generateValue: true          # Render generates a secure random value
      - key: ENVIRONMENT
        value: production
      # DB connection pool. Connections are cheap on RAM (~1-2 MB each); the
      # 512 MB limit was about gunicorn workers, not the pool. 8 steady + 12
      # burst = 20 max — enough headroom for live polling traffic without
      # exhausting Postgres (well under the plan's connection limit).
      - key: DB_POOL_SIZE
        value: "8"
      - key: DB_MAX_OVERFLOW
        value: "12"
      # Audit queue — smaller buffer to cap memory spike under load
      - key: AUDIT_QUEUE_MAXSIZE
        value: "500"
      - key: AUDIT_POOL_RESERVE
        value: "2"

      # ── Cookie / CORS (update to your actual domain) ────────────────────────
      - key: COOKIE_SECURE
        value: "true"
      - key: COOKIE_SAMESITE
        value: lax
      - key: COOKIE_DOMAIN
        value: .shulehq.co.ke        # leading dot — works for api + app + admin subdomains
      - key: CORS_ORIGINS
        value: "https://shulehq.co.ke,https://app.shulehq.co.ke,https://admin.shulehq.co.ke"
      - key: CORS_BASE_DOMAIN
        value: shulehq.co.ke         # enables wildcard tenant subdomain CORS

      # ── Fill in your real values for these ─────────────────────────────────
      - key: POSTGRES_USER
        value: postgres               # Render Postgres uses its own user — override below
      - key: MPESA_CONSUMER_KEY
        sync: false                   # fill in Render dashboard; sync:false = secret
      - key: MPESA_CONSUMER_SECRET
        sync: false
      - key: MPESA_PASSKEY
        sync: false
      - key: MPESA_SHORTCODE
        sync: false
      - key: MPESA_CALLBACK_URL
        value: https://api.shulehq.co.ke/api/v1/payments/mpesa/callback
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: SMS_PROVIDER_API_KEY
        sync: false

  # ── Redis (Valkey — free tier, 25 MB) ───────────────────────────────────────
  - type: redis
    name: shulehq-redis
    plan: free
    ipAllowList: []                   # only accessible from Render internal network

databases:
  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  - name: shulehq-postgres
    plan: basic-256mb                 # new plan name — 256 MB RAM, 1 GB storage, $7/mo
    databaseName: school_manager_db
    user: shulehq
