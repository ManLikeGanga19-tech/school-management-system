services:
  # ── Backend (FastAPI / Gunicorn) ────────────────────────────────────────────
  - type: web
    name: shulehq-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    preDeployCommand: python -m alembic upgrade heads
    startCommand: gunicorn app.main:app --config gunicorn.conf.py
    plan: starter        # $7/mo — upgrade to standard ($25/mo) when load grows
    healthCheckPath: /readyz
    autoDeploy: true
    envVars:
      # ── Filled automatically by Render from linked databases ────────────────
      - key: DATABASE_URL
        fromDatabase:
          name: shulehq-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: shulehq-redis
          type: redis
          property: connectionString

      # ── Set these manually in the Render dashboard after first deploy ───────
      - key: SECRET_KEY
        generateValue: true          # Render generates a secure random value
      - key: ENVIRONMENT
        value: production
      - key: GUNICORN_WORKERS
        value: "2"

      # ── Cookie / CORS (update to your actual domain) ────────────────────────
      - key: COOKIE_SECURE
        value: "true"
      - key: COOKIE_SAMESITE
        value: lax
      - key: COOKIE_DOMAIN
        value: .shulehq.co.ke        # leading dot — works for api + app + admin subdomains
      - key: CORS_ORIGINS
        value: "https://shulehq.co.ke,https://app.shulehq.co.ke,https://admin.shulehq.co.ke"
      - key: CORS_BASE_DOMAIN
        value: shulehq.co.ke         # enables wildcard tenant subdomain CORS

      # ── Fill in your real values for these ─────────────────────────────────
      - key: POSTGRES_USER
        value: postgres               # Render Postgres uses its own user — override below
      - key: MPESA_CONSUMER_KEY
        sync: false                   # fill in Render dashboard; sync:false = secret
      - key: MPESA_CONSUMER_SECRET
        sync: false
      - key: MPESA_PASSKEY
        sync: false
      - key: MPESA_SHORTCODE
        sync: false
      - key: MPESA_CALLBACK_URL
        value: https://api.shulehq.co.ke/api/v1/payments/mpesa/callback
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: SMS_PROVIDER_API_KEY
        sync: false

  # ── Redis (Valkey — free tier, 25 MB) ───────────────────────────────────────
  - type: redis
    name: shulehq-redis
    plan: free
    ipAllowList: []                   # only accessible from Render internal network

databases:
  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  - name: shulehq-postgres
    plan: basic-256mb                 # new plan name — 256 MB RAM, 1 GB storage, $7/mo
    databaseName: school_manager_db
    user: shulehq
